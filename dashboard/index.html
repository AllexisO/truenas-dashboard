<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrueNAS Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>TrueNAS Dashboard</h1>
        </header>

        <div class="cards">
            <!-- CPU Card -->
            <div class="card" id="cpu-card">
                <h2>CPU</h2>
                <div class="cpu-total">
                    <span id="cpu-usage">--</span>%
                </div>
            </div>

             <!-- CPU Cores -->
            <div class="card" id="cpu-cores-card">
                <div class="card-header">
                    <h2>CPU Cores</h2>
                    <span id="cpu-threads"></span>
                </div>
                <div class="cores-grid" id="cores-grid"></div>
            </div>

            <template id="core-template">
                <div class="core">
                    <div class="core-top">
                        <span class="core-name"></span>
                        <span class="core-pct">0%</span>
                    </div>
                    <div class="core-bar-wrap">
                        <div class="core-bar"></div>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
