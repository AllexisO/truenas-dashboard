<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrueNAS Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <main>
            <div class="settings-panel" id="settings-panel">
                <div class="settings-header">
                    <h2>Settings</h2>
                    <button class="settings-close" id="settings-close">x</button>
                </div>
                <div class="settings-body">
                    <div class="settings-item">
                        <label>CPU</label>
                        <input type="checkbox" id="settings-cpu" data-widget="cpu" data-key="enabled">
                    </div>
                    <div class="settings-item">
                        <label>CPU Cores</label>
                        <input type="checkbox" id="settings-cpu-cores" data-widget="cpu" data-key="show_cores">
                    </div>
                </div>
                <button class="settings-save" id="settings-save">Save</button>
            </div>
           
            
        </main>
    </div>

    <div class="main-container">
        <div class="main-sidebar">
            <div class="sidebar-header">
                <div class="server-logo">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="geometricPrecision">
                        <rect x="10" y="6" width="44" height="52" rx="6" fill="none" stroke="#3B8BD4" stroke-width="4"/>
                        <rect x="16" y="10" width="32" height="8" rx="2" fill="#3B8BD4" opacity="0.35"/>
                        <rect x="16" y="22" width="32" height="8" rx="2" fill="#3B8BD4" opacity="0.55"/>
                        <rect x="16" y="34" width="32" height="8" rx="2" fill="#3B8BD4" opacity="0.75"/>
                        <rect x="16" y="46" width="32" height="8" rx="2" fill="#3B8BD4" opacity="0.95"/>
                        <circle id="led-cpu" cx="20" cy="14" r="2.5" fill="#1D9E75" data-tooltip="CPU: --"></circle>
                        <circle id="led-ram" cx="20" cy="26" r="2.5" fill="#1D9E75" data-tooltip="RAM: --"></circle>
                        <circle id="led-disk" cx="20" cy="38" r="2.5" fill="#1D9E75" data-tooltip="Disks: --"></circle>
                        <circle id="led-network" cx="20" cy="50" r="2.5" fill="#1D9E75" data-tooltip="Network: --"></circle>
                    </svg>
                </div>
                <div>
                    <div class="server-logo-text">TrueNAS Dashboard</div>
                    <div class="server-logo-version">Dashboard v0.1</div>
                </div>
            </div>
            <div class="sidebar-body">
                <div class="server-full-width sidebar-border sidebar-cpu">
                    <div class="sidebar-data-header">
                        <p>CPU</p>
                    </div>
                    <div class="sidebar-cpu-body">
                        <div class="sidebar-cpu-load sidebar-data-server">
                            <span>Load</span>
                            <div class="sidebar-status">
                                <span id="sidebar-cpu-usage">--</span>
                            </div>
                        </div>
                        <div class="sidebar-cpu-temperature sidebar-data-server">
                            <span>Temperature</span>
                            <div class="sidebar-status">
                                <span id="sidebar-cpu-temp">--</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="server-full-width sidebar-border sidebar-ram">
                    <div class="sidebar-data-header">
                        <p>RAM</p>
                    </div>
                    <div class="sidebar-ram-body">
                        <div class="sidebar-ram-used sidebar-data-server">
                            <span>Used</span>
                            <div class="sidebar-status">
                                <span id="sidebar-ram-used">--</span>
                            </div>
                        </div>
                        <div class="sidebar-ram-free sidebar-data-server">
                            <span>Free</span>
                            <div class="sidebar-status">
                                <span id="sidebar-ram-free">--</span>
                            </div>
                        </div>
                        <div class="sidebar-ram-arc sidebar-data-server">
                            <span>ARC</span>
                            <div class="sidebar-status">
                                <span id="sidebar-ram-arc">--</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="sidebar-footer">
                <div class="server-full-width">
                    <span>Status</span>
                    <div class="server-status__connection">
                        <div class="server-status-dot" id="server-status-dot"></div>
                        <span id="server-status-text" id="server-status-text">Connecting ...</span>
                    </div>
                </div>
                <div class="server-full-width">
                    <span>HOST</span>
                    <span id="server-ip"></span>
                </div>
                <div class="server-full-width">
                    <span>Server Version</span>
                    <span id="server-version"></span>
                </div>
                <div class="server-full-width">
                    <span>Updatime</span>
                    <span id="server-uptime"></span>
                </div>
                <div class="server-full-width">
                    <button class="settings-btn" id="settings-btn">⚙</button>
                </div>
            </div>
        </div>

        <div class="main-content">
            <!-- CPU -->
            <template id="cpu-card-template">
                <div class="card" id="cpu-card">
                    <h2>CPU</h2>
                    <div class="cpu-total">
                        <span id="cpu-usage">--</span>%
                    </div>
                </div>
            </template>

            <!-- CPU Cores -->
            <template id="cpu-cores-card-template">
                <div class="card" id="cpu-cores-card">
                    <div class="card-header">
                        <h2>CPU Cores</h2>
                        <span id="cpu-threads"></span>
                    </div>
                    <div class="cores-grid" id="cores-grid"></div>
                </div>
                <template id="core-template">
                    <div class="core">
                        <div class="core-top">
                            <span class="core-name"></span>
                            <span class="core-pct">0%</span>
                        </div>
                        <div class="core-bar-wrap">
                            <div class="core-bar"></div>
                        </div>
                    </div>
                </template>
            </template>

            <!-- RAM -->
            <template id="ram-card-template">
                <div class="card" id="ram-card">
                    <div class="card-header">
                        <h2>RAM</h2>
                        <span id="ram-total"></span>
                    </div>
                    <div class="ram-used" id="ram-used">--</div>
                    <div class="bar-wrap">
                        <div class="bar-fill" id="ram-bar"></div>
                    </div>
                    <div class="ram-details">
                        <span>Free: <span id="ram-free">--</span></span>
                        <span>ARC: <span id="ram-arc">--</span></span>
                    </div>
                </div>
            </template>

            <!-- NETWORK -->
            <template id="network-card-template">
                <div class="card" id="network-card">
                    <div class="card-header">
                        <h2>Network</h2>
                        <span id="network-status"></span>
                    </div>
                    <div class="network-rows">
                        <div class="network-row">
                            <span class="network-label">▼ RX</span>
                            <span class="network-value" id="network-rx">--</span>
                        </div>
                        <div class="network-row">
                            <span class="network-label">▲ TX</span>
                            <span class="network-value" id="network-tx">--</span>
                        </div>
                        <div class="network-row">
                            <span class="network-label">Speed</span>
                            <span class="network-value" id="network-speed">--</span>
                        </div>
                    </div>
                </div>
            </template>

            <!-- HDD -->
            <template id="disks-card-template">
                <div class="card" id="disks-card">
                    <div class="card-header">
                        <h2>Disks</h2>
                        <span id="disks-count"></span>
                    </div>
                    <div class="disks-grid" id="disks-grid"></div>
                </div>
            </template>
            <template id="disk-item-template">
                <div class="disk-item">
                    <div class="disk-item-header">
                        <div class="disk-item-left">
                            <span class="disk-name"></span>
                            <span class="disk-model"></span>
                        </div>
                        <div class="disk-item-right">
                            <span class="disk-temp"></span>
                            <span class="disk-type"></span>
                        </div>
                    </div>
                    <div class="bar-wrap">
                        <div class="bar-fill disk-bar"></div> 
                    </div>
                    <div class="disk-usage">
                        <span class="disk-allocated"></span>
                        <span class="disk-size"></span>
                    </div>
                </div>
            </template>

            <div class="cards" id="cards"></div>
        </div>
    </div>

    <div class="tooltip" id="tooltip"></div>
    <script src="/js/header.js"></script>
    <script src="/js/settings.js"></script>
    <script src="/js/widgets/cpu-widget.js"></script>
    <script src="/js/widgets/ram-widget.js"></script>
    <script src="/js/widgets/network-widget.js"></script>
    <script src="/js/widgets/disks-widget.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
