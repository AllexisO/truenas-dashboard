<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrueNAS Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <img src="/icon.svg" alt="TrueNAS Dashboard" class="header-logo">
                <div class="header-title">
                    <h1>TrueNAS Dashboard</h1>
                    <span id="server-version"></span>
                </div>
            </div>
            <div class="header-right">
                <span id="server-ip"></span>
                <span id="server-uptime"></span>
                <div class="hedaer-status">
                    <div class="status-dot" id="status-dot"></div>
                    <span id="status-text">Connecting ...</span>
                </div>
                <button class="settings-btn" id="settings-btn">⚙</button>
            </div>
        </header>

        <main>
            <div class="settings-panel" id="settings-panel">
                <div class="settings-header">
                    <h2>Settings</h2>
                    <button class="settings-close" id="settings-close">x</button>
                </div>
                <div class="settings-body">
                    <div class="settings-item">
                        <label>CPU</label>
                        <input type="checkbox" id="settings-cpu" data-widget="cpu" data-key="enabled">
                    </div>
                    <div class="settings-item">
                        <label>CPU Cores</label>
                        <input type="checkbox" id="settings-cpu-cores" data-widget="cpu" data-key="show_cores">
                    </div>
                </div>
                <button class="settings-save" id="settings-save">Save</button>
            </div>
            <div class="cards">
                <!-- CPU Card -->
                <div class="card" id="cpu-card">
                    <h2>CPU</h2>
                    <div class="cpu-total">
                        <span id="cpu-usage">--</span>%
                    </div>
                </div>

                <!-- CPU Cores -->
                <div class="card" id="cpu-cores-card">
                    <div class="card-header">
                        <h2>CPU Cores</h2>
                        <span id="cpu-threads"></span>
                    </div>
                    <div class="cores-grid" id="cores-grid"></div>
                </div>

                <template id="core-template">
                    <div class="core">
                        <div class="core-top">
                            <span class="core-name"></span>
                            <span class="core-pct">0%</span>
                        </div>
                        <div class="core-bar-wrap">
                            <div class="core-bar"></div>
                        </div>
                    </div>
                </template>
            </div>
        </main>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
